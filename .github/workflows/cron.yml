name: Hourly scan + score + daily digest

# Vercel Hobby caps Vercel Cron at once-per-day. To run hourly we
# trigger our scan and score routes from GitHub Actions instead. The
# daily digest runs once a day at a fixed time.
#
# Required repository secrets:
#   SITE_URL      — your deployed Vercel URL (no trailing slash)
#   CRON_SECRET   — same value you set in Vercel env

on:
  schedule:
    # Hourly at :05 — gives Vercel a few seconds headroom for the
    # cron tick to align cleanly with the hour boundary.
    - cron: "5 * * * *"
    # Daily digest at 00:15 UTC. Adjust to whatever time you want to
    # receive the email — UTC.
    - cron: "15 0 * * *"
  workflow_dispatch:

jobs:
  scan-and-score:
    if: github.event.schedule == '5 * * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Scan target companies
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/scan"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # Score in a loop. Each invocation processes up to
      # PER_USER_BATCH_LIMIT rows (see app/api/cron/score/route.ts).
      # GH Actions cron is unreliable on free tier (multi-hour drops
      # observed); running 4 passes per tick lets a single firing
      # catch up the ~hour of backlog any dropped run would have
      # produced. Caps in scoring_caps still enforce the real spend
      # budget so this can't blow up cost.
      - name: Score new BV/HIGH/MEDIUM rows (loop)
        run: |
          for i in 1 2 3 4; do
            echo "--- score pass $i ---"
            curl --fail-with-body --silent --show-error \
              --retry 3 --retry-delay 15 --retry-all-errors \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$SITE_URL/api/cron/score"
            echo
          done
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-digest:
    if: github.event.schedule == '15 0 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send daily digest email
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/digest"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
