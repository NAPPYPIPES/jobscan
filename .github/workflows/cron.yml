name: 3-hourly scan + score + daily digest

# Vercel Hobby caps Vercel Cron at once-per-day. We trigger scan and
# score from GitHub Actions instead. The daily digest fires once a
# day at a fixed time.
#
# Required repository secrets:
#   SITE_URL      — your deployed Vercel URL (no trailing slash)
#   CRON_SECRET   — same value you set in Vercel env

on:
  schedule:
    # Every 3 hours at :05 — gives Vercel a few seconds headroom for
    # the cron tick to align cleanly with the hour boundary. 8 fires
    # per day (00:05, 03:05, ... 21:05 UTC). Was hourly originally;
    # moved to 3-hourly after observing GH Actions free-tier
    # scheduled-workflow drops (multi-hour gaps several times daily).
    # The score-loop step (4 passes per fire) was sized accordingly:
    # a single fire now drains ~3 hours of arrivals plus catches up
    # any dropped run.
    - cron: "5 */3 * * *"
    # Daily digest at 01:00 UTC = 8pm EST / 9pm EDT (always within
    # the user's 8-9pm Eastern preference regardless of DST).
    - cron: "0 1 * * *"
  workflow_dispatch:

jobs:
  scan-and-score:
    if: github.event.schedule == '5 */3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Scan target companies
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/scan"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # Score in a loop. Each invocation processes up to
      # PER_USER_BATCH_LIMIT rows (see app/api/cron/score/route.ts).
      # GH Actions cron is unreliable on free tier (multi-hour drops
      # observed); running 4 passes per tick lets a single firing
      # catch up the ~hour of backlog any dropped run would have
      # produced. Caps in scoring_caps still enforce the real spend
      # budget so this can't blow up cost.
      - name: Score new BV/HIGH/MEDIUM rows (loop)
        run: |
          for i in 1 2 3 4; do
            echo "--- score pass $i ---"
            curl --fail-with-body --silent --show-error \
              --retry 3 --retry-delay 15 --retry-all-errors \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$SITE_URL/api/cron/score"
            echo
          done
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-digest:
    if: github.event.schedule == '0 1 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send daily digest email
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/digest"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
