name: 3-hourly scan + score + daily digest

# Vercel Hobby caps Vercel Cron at once-per-day. We trigger scan and
# score from GitHub Actions instead. The daily digest fires once a
# day at a fixed time.
#
# Required repository secrets:
#   SITE_URL      — your deployed Vercel URL (no trailing slash)
#   CRON_SECRET   — same value you set in Vercel env

on:
  schedule:
    # Every 3 hours at :23 — deliberately an odd, off-the-hour minute.
    # GitHub's shared scheduler is most congested (and most likely to
    # drop runs) on the hour and at :00/:05; odd minutes fire more
    # reliably on the free tier. 8 fires/day (00:23, 03:23, ... 21:23).
    # Was ":05"; moved after scheduled runs failed to fire at all
    # (2026-07-02). The score-loop step (4 passes per fire) drains ~3h
    # of arrivals plus catches up any dropped run.
    - cron: "23 */3 * * *"
    # Daily digest at 01:37 UTC = 8:37pm EST / 9:37pm EDT (within the
    # user's 8-9pm Eastern window; odd minute for scheduler reliability).
    - cron: "37 1 * * *"
  workflow_dispatch:

jobs:
  scan-and-score:
    if: github.event.schedule == '23 */3 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Scan target companies
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/scan"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

      # Score in a loop. Each invocation processes up to
      # PER_USER_BATCH_LIMIT rows (see app/api/cron/score/route.ts).
      # GH Actions cron is unreliable on free tier (multi-hour drops
      # observed); running 4 passes per tick lets a single firing
      # catch up the ~hour of backlog any dropped run would have
      # produced. Caps in scoring_caps still enforce the real spend
      # budget so this can't blow up cost.
      - name: Score new BV/HIGH/MEDIUM rows (loop)
        run: |
          for i in 1 2 3 4; do
            echo "--- score pass $i ---"
            curl --fail-with-body --silent --show-error \
              --retry 3 --retry-delay 15 --retry-all-errors \
              -H "Authorization: Bearer $CRON_SECRET" \
              "$SITE_URL/api/cron/score"
            echo
          done
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}

  daily-digest:
    if: github.event.schedule == '37 1 * * *' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Send daily digest email
        run: |
          curl --fail-with-body --silent --show-error \
            --retry 3 --retry-delay 15 --retry-all-errors \
            -H "Authorization: Bearer $CRON_SECRET" \
            "$SITE_URL/api/cron/digest"
        env:
          SITE_URL: ${{ secrets.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
